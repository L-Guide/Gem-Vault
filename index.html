<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Gem Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0118;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;color:#fff}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity .3s}
.screen.active{display:flex;opacity:1}
.screen.fade-in{animation:fadeIn .35s ease-out}
@keyframes fadeIn{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.topbar{position:fixed;top:0;left:0;width:100%;height:48px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.2));display:flex;align-items:center;padding:0 12px;z-index:100;backdrop-filter:blur(8px)}
.topbar .level-title{flex:1;text-align:center;font-size:14px;font-weight:700;text-shadow:0 0 8px rgba(255,255,255,0.3)}
.topbar .timer{font-size:15px;font-weight:700;color:#00e5ff;min-width:50px;text-align:center;transition:color .3s}
.topbar .timer.warn{color:#ff9800;animation:timerPulse .5s infinite alternate}
.topbar .timer.danger{color:#ff1744;animation:timerPulse .3s infinite alternate}
@keyframes timerPulse{0%{transform:scale(1)}100%{transform:scale(1.15)}}
.timer-bar{position:fixed;top:48px;left:0;width:100%;height:3px;background:rgba(255,255,255,0.08);z-index:99}
.timer-fill{height:100%;transition:width .1s linear,background .3s;background:linear-gradient(90deg,#00e5ff,#00bcd4)}
.timer-fill.warn{background:linear-gradient(90deg,#ff9800,#f57c00)}
.timer-fill.danger{background:linear-gradient(90deg,#ff1744,#d50000)}
.menu-title{font-size:min(16vw,64px);font-weight:900;letter-spacing:4px;position:relative;text-align:center}
.menu-title .txt{background:linear-gradient(135deg,#ffd54f,#ff9800,#ff5722,#ffd54f);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;filter:drop-shadow(0 0 20px rgba(255,152,0,0.6)) drop-shadow(0 0 40px rgba(255,87,34,0.3))}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.menu-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px;letter-spacing:6px;text-transform:uppercase}
.coins-bar{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,213,79,0.15),rgba(255,152,0,0.1));border:1px solid rgba(255,213,79,0.2);padding:8px 24px;border-radius:25px;margin-bottom:20px;font-size:16px;font-weight:600;box-shadow:0 4px 15px rgba(255,152,0,0.15)}
.btn{padding:12px 36px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left .5s}
.btn:hover::after{left:100%}
.btn:active{transform:scale(0.96);filter:brightness(1.1)}
.btn-play{background:linear-gradient(135deg,#00e676,#00c853);color:#0a0a1a;min-width:180px;box-shadow:0 4px 20px rgba(0,230,118,0.35);text-shadow:0 1px 2px rgba(0,0,0,0.1)}
.btn-retry{background:linear-gradient(135deg,#ff9100,#ff6d00);color:#fff;min-width:150px;box-shadow:0 4px 18px rgba(255,145,0,0.3)}
.btn-menu{background:linear-gradient(135deg,#2979ff,#00b0ff);color:#fff;min-width:150px;box-shadow:0 4px 18px rgba(41,121,255,0.3)}
.btn-shop{background:linear-gradient(135deg,#ab47bc,#7c4dff);color:#fff;box-shadow:0 4px 18px rgba(171,71,188,0.3)}
.btn-daily{background:linear-gradient(135deg,#ff6f00,#ffc107);color:#1a0533;min-width:180px;box-shadow:0 4px 18px rgba(255,111,0,0.3)}
.btn-ach{background:linear-gradient(135deg,#7c4dff,#b388ff);color:#fff;box-shadow:0 4px 18px rgba(124,77,255,0.3)}
.btn-sm{padding:8px 18px;font-size:12px;border-radius:10px}
.level-map{width:100%;max-width:400px;overflow-y:auto;max-height:calc(100vh - 100px);padding:16px 12px 70px}
.level-path{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.level-node{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;border:2px solid rgba(255,255,255,0.15);transition:all .25s;position:relative;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px)}
.level-node.unlocked{border-color:#ffd54f;background:linear-gradient(135deg,rgba(106,27,154,0.8),rgba(171,71,188,0.8));box-shadow:0 0 12px rgba(171,71,188,0.3)}
.level-node.unlocked:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(171,71,188,0.5)}
.level-node.completed{border-color:#00e676;background:linear-gradient(135deg,rgba(27,94,32,0.8),rgba(67,160,71,0.8))}
.level-node.locked{opacity:0.25;pointer-events:none}
.level-node.boss{border-color:#ff1744;box-shadow:0 0 15px rgba(255,23,68,0.4)}
.level-node .stars{position:absolute;bottom:-13px;font-size:8px;letter-spacing:1px}
.world-title{width:100%;text-align:center;font-size:13px;font-weight:700;padding:8px 0;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 10px currentColor}
.grid-wrap{position:relative;margin-top:55px}
.grid{display:grid;gap:3px;padding:6px;background:rgba(0,0,0,0.3);border-radius:10px;box-shadow:inset 0 0 30px rgba(0,0,0,0.3),0 0 20px rgba(0,0,0,0.2);will-change:transform}
.cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(18px,6vw,28px);border-radius:8px;cursor:pointer;transition:transform .12s,box-shadow .15s;position:relative;background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.05);will-change:transform;transform:translateZ(0)}
.cell:active{transform:scale(0.88)}
.cell.selected{box-shadow:0 0 0 2px #ffd54f,0 0 20px rgba(255,213,79,0.5);transform:scale(1.12);z-index:2;background:rgba(255,213,79,0.1)}
.cell.special-line{box-shadow:0 0 12px rgba(0,229,255,0.7),inset 0 0 8px rgba(0,229,255,0.2)}
.cell.special-bomb{box-shadow:0 0 12px rgba(255,23,68,0.7),inset 0 0 8px rgba(255,23,68,0.2)}
.cell.special-mega{box-shadow:0 0 16px rgba(255,215,0,0.8),inset 0 0 10px rgba(255,215,0,0.3)}
.cell.special-shield{box-shadow:0 0 10px rgba(0,230,118,0.7)}
.cell.special-magnet{box-shadow:0 0 10px rgba(156,39,176,0.7)}
.cell.hint{animation:hintPulse .5s infinite alternate}
@keyframes hintPulse{0%{transform:scale(1)}100%{transform:scale(1.1);box-shadow:0 0 15px rgba(255,213,79,0.6)}}
.cell.removing{animation:gemRemove .25s forwards}
@keyframes gemRemove{0%{transform:scale(1);opacity:1}40%{transform:scale(1.4);opacity:0.6}100%{transform:scale(0);opacity:0}}
.cell.falling{animation:gemFall .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes gemFall{0%{transform:translateY(-35px);opacity:0}60%{opacity:1}100%{transform:translateY(0);opacity:1}}
.powerbar{position:fixed;bottom:0;left:0;width:100%;height:52px;background:linear-gradient(0deg,rgba(0,0,0,0.6),rgba(0,0,0,0.2));display:flex;align-items:center;justify-content:center;gap:12px;z-index:100;backdrop-filter:blur(6px)}
.pwr-btn{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.12);position:relative;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.pwr-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.15)}
.pwr-btn .cnt{position:absolute;top:-5px;right:-5px;background:linear-gradient(135deg,#ff1744,#d50000);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 6px rgba(255,23,68,0.4)}
.combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:250;text-align:center}
.combo-text{font-size:clamp(24px,7vw,48px);font-weight:900;text-shadow:0 0 25px currentColor;animation:comboPop .6s forwards;white-space:nowrap}
@keyframes comboPop{0%{opacity:0;transform:scale(0.5) translateY(20px)}30%{opacity:1;transform:scale(1.2) translateY(-10px)}100%{opacity:0;transform:scale(1) translateY(-50px)}}
.combo-sub{font-size:clamp(12px,3.5vw,20px);opacity:0.8;animation:comboSub .8s forwards}
@keyframes comboSub{0%{opacity:0;transform:translateY(10px)}30%{opacity:0.8;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.speed-bonus{position:fixed;top:20%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:250;font-size:clamp(14px,4vw,22px);font-weight:700;color:#00e5ff;text-shadow:0 0 12px rgba(0,229,255,0.5);animation:speedPop .7s forwards}
@keyframes speedPop{0%{opacity:0;transform:translateX(-50%) scale(0.5)}30%{opacity:1;transform:translateX(-50%) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
.particle-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:240;contain:layout style}
.shake{animation:shakeAnim .25s}
@keyframes shakeAnim{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px) translateY(1px)}40%{transform:translateX(3px) translateY(-1px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300}
.confetti span{position:absolute;width:7px;height:7px;border-radius:2px;animation:confettiFall 1.8s forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
@keyframes gpartFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx,30px),var(--dy,-30px)) scale(0.2)}}
.gpart{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:gpartFly .35s ease-out forwards;z-index:99}
.chest-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.chest{font-size:70px;cursor:pointer;animation:chestShake .5s infinite alternate;filter:drop-shadow(0 0 15px rgba(255,213,79,0.3))}
@keyframes chestShake{0%{transform:rotate(-5deg) scale(1)}100%{transform:rotate(5deg) scale(1.05)}}
.chest.open{animation:chestOpen .5s forwards}
@keyframes chestOpen{0%{transform:scale(1)}50%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1.1) translateY(-15px)}}
.chest-hint{font-size:12px;color:rgba(255,255,255,0.4);animation:chestPulse 1s infinite alternate}
@keyframes chestPulse{0%{opacity:0.4}100%{opacity:1}}
.star-rating{display:flex;gap:6px;margin:8px 0}
.star-rating .s{font-size:32px;opacity:0.15;transform:scale(0.4);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.star-rating .s.earned{opacity:1;transform:scale(1);filter:drop-shadow(0 0 8px #ffd54f)}
.shop-grid,.ach-grid{display:flex;flex-direction:column;gap:7px;width:90%;max-width:320px;max-height:55vh;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.15) transparent}
.shop-item,.ach-item{display:flex;align-items:center;gap:10px;background:linear-gradient(145deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);transition:transform .15s}
.shop-item:active,.ach-item:active{transform:scale(0.98)}
.shop-item .icon,.ach-item .ach-icon{font-size:22px;width:34px;text-align:center}
.shop-item .info,.ach-item .ach-info{flex:1}
.shop-item .info .name,.ach-item .ach-info .ach-name{font-size:13px;font-weight:600}
.shop-item .info .desc,.ach-item .ach-info .ach-desc{font-size:10px;color:rgba(255,255,255,0.35)}
.shop-item .price{font-size:12px;color:#ffd54f;font-weight:700;padding:5px 12px;border-radius:8px;background:linear-gradient(135deg,rgba(255,213,79,0.15),rgba(255,152,0,0.1));border:1px solid rgba(255,213,79,0.2);cursor:pointer;transition:all .15s}
.shop-item .price:active{transform:scale(0.95)}
.shop-item .price.cant{opacity:0.25;pointer-events:none}
.ach-item.unlocked{border-color:rgba(255,213,79,0.3);background:rgba(255,213,79,0.06)}
.ach-item.locked{opacity:0.3}
.ach-item .ach-reward{font-size:10px;color:#ffd54f}
.progress-wrap{width:80%;max-width:280px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e676,#76ff03);border-radius:4px;transition:width .3s}
.sec-title{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.gap-sm{height:6px}.gap-md{height:12px}
.time-bonus{font-size:18px;color:#00e5ff;font-weight:700;text-shadow:0 0 10px rgba(0,229,255,0.4)}
.event-banner{position:fixed;top:52px;left:50%;transform:translateX(-50%);padding:5px 16px;border-radius:0 0 10px 10px;font-size:11px;font-weight:700;z-index:101;animation:eventSlide .3s ease-out;white-space:nowrap;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
@keyframes eventSlide{0%{transform:translateX(-50%) translateY(-100%)}100%{transform:translateX(-50%) translateY(0)}}
.toast{position:fixed;top:55px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(0,230,118,0.95),rgba(0,200,83,0.95));padding:7px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:400;animation:toastAnim 2.5s forwards;white-space:nowrap;box-shadow:0 4px 15px rgba(0,230,118,0.3)}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-15px)}10%{opacity:1;transform:translateX(-50%) translateY(3px)}85%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-15px)}}
.daily-info{text-align:center;padding:10px;background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border-radius:12px;margin:10px 0;max-width:300px;border:1px solid rgba(255,255,255,0.05)}
.daily-info .streak{font-size:28px;font-weight:900;background:linear-gradient(135deg,#ff9800,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.daily-info .streak-label{font-size:11px;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="menuScreen" class="screen active">
  <div class="menu-title"><span class="txt">GEM VAULT</span></div>
  <div class="menu-sub">Match-3 Puzzle</div>
  <div class="coins-bar">&#x1F4B0; <span id="menuCoins">0</span></div>
  <button class="btn btn-play" onclick="showLevelMap()">&#x25B6; PLAY</button>
  <div class="gap-sm"></div>
  <button class="btn btn-daily" onclick="showDaily()">&#x1F4C5; DAILY CHALLENGE</button>
  <div class="gap-sm"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-shop btn-sm" onclick="showShop()">&#x1F6D2; SHOP</button>
    <button class="btn btn-ach btn-sm" onclick="showAchievements()">&#x1F3C6; AWARDS</button>
  </div>
</div>
<div id="mapScreen" class="screen">
  <div style="width:100%;height:48px;display:flex;align-items:center;padding:0 12px;flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,0.5),transparent)">
    <span style="font-size:22px;cursor:pointer;opacity:0.6" onclick="showMenu()">&#x2190;</span>
    <div style="flex:1;text-align:center;font-weight:700;font-size:14px;letter-spacing:1px">SELECT LEVEL</div>
    <div style="font-size:13px;opacity:0.7">&#x1F4B0;<span id="mapCoins">0</span></div>
  </div>
  <div class="level-map" id="levelMapContainer"></div>
</div>
<div id="gameScreen" class="screen">
  <div class="topbar">
    <div style="font-size:12px;color:rgba(255,255,255,0.5)" id="gameLevel">Level 1</div>
    <div class="level-title" id="gameTarget">Score: 0/500</div>
    <div class="timer" id="gameTimer">60s</div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div id="eventBanner" class="event-banner" style="display:none"></div>
  <div class="grid-wrap" id="gridWrap"><div class="grid" id="grid"></div></div>
  <div class="powerbar">
    <div class="pwr-btn" onclick="usePower('hint')" title="Hint">&#x1F4A1;<span class="cnt" id="hintCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('shuffle')" title="Shuffle">&#x1F500;<span class="cnt" id="shuffleCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('freeze')" title="Time Freeze">&#x1F9CA;<span class="cnt" id="freezeCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('bomb')" title="Color Bomb">&#x1F4A3;<span class="cnt" id="bombCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('magnet')" title="Magnet">&#x1F9F2;<span class="cnt" id="magnetCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('shield')" title="Shield">&#x1F6E1;&#xFE0F;<span class="cnt" id="shieldCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('extra_time')" title="+15 Seconds">&#x23F1;&#xFE0F;<span class="cnt" id="extraTimeCnt">0</span></div>
  </div>
</div>
<div id="completeScreen" class="screen">
  <div style="font-size:min(9vw,36px);font-weight:900;background:linear-gradient(135deg,#00e676,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(0,230,118,0.4))">LEVEL COMPLETE!</div>
  <div class="star-rating"><span class="s" id="s1">&#x2B50;</span><span class="s" id="s2">&#x2B50;</span><span class="s" id="s3">&#x2B50;</span></div>
  <div id="completeStats" style="text-align:center"></div>
  <div class="sec-title">YOUR REWARD</div>
  <div class="chest-wrap">
    <div class="chest" id="chest" onclick="openChest()">&#x1F4E6;</div>
    <div class="chest-hint" id="chestHint">Tap the chest!</div>
  </div>
  <div id="rewardText" style="font-size:16px;color:#ffd54f;font-weight:700;min-height:20px;margin-top:6px"></div>
  <div class="gap-md"></div>
  <button class="btn btn-play" onclick="nextLevel()">NEXT LEVEL &#x2192;</button>
  <div class="gap-sm"></div>
  <button class="btn btn-menu btn-sm" onclick="showLevelMap()">LEVEL MAP</button>
</div>
<div id="failScreen" class="screen">
  <div style="font-size:min(9vw,36px);font-weight:900;background:linear-gradient(135deg,#ff1744,#ff5252);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(255,23,68,0.4))">TIME'S UP!</div>
  <div class="gap-md"></div>
  <div class="sec-title">PROGRESS</div>
  <div class="progress-wrap"><div class="progress-fill" id="failProgress" style="width:0%"></div></div>
  <div id="failScore" style="font-size:13px;color:rgba(255,255,255,0.4)"></div>
  <div class="gap-md"></div>
  <button class="btn btn-retry" onclick="retryLevel()">&#x1F504; RETRY</button>
  <div class="gap-sm"></div>
  <button class="btn btn-menu btn-sm" onclick="showLevelMap()">MAP</button>
</div>
<div id="shopScreen" class="screen">
  <div style="width:100%;max-width:400px;padding:0 12px">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span style="font-size:22px;cursor:pointer;opacity:0.6" onclick="showMenu()">&#x2190;</span>
      <div style="flex:1;text-align:center;font-weight:700;font-size:16px">&#x1F6D2; SHOP</div>
      <div style="font-size:13px;opacity:0.7">&#x1F4B0;<span id="shopCoins">0</span></div>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>
</div>
<div id="achScreen" class="screen">
  <div style="width:100%;max-width:400px;padding:0 12px">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span style="font-size:22px;cursor:pointer;opacity:0.6" onclick="showMenu()">&#x2190;</span>
      <div style="flex:1;text-align:center;font-weight:700;font-size:16px">&#x1F3C6; AWARDS</div>
      <div id="achCount" style="font-size:12px;opacity:0.5"></div>
    </div>
    <div class="ach-grid" id="achGrid"></div>
  </div>
</div>
<div id="dailyScreen" class="screen">
  <div style="width:100%;max-width:400px;padding:0 12px;text-align:center">

<script>
try{(async function(){
try{if(typeof ytgame!=='undefined'&&ytgame.game)ytgame.game.firstFrameReady()}catch(e){}

var bgCv=document.getElementById('bgCanvas'),bgCtx=bgCv.getContext('2d');
var bgW,bgH,bgGems=[],bgStars=[],bgGrad=null;
function resizeBg(){bgW=bgCv.width=innerWidth;bgH=bgCv.height=innerHeight;bgGrad=null}
resizeBg();onresize=resizeBg;
var BG_GEMS=['\uD83D\uDC8E','\uD83D\uDD37','\uD83D\uDD36','\u2B50','\uD83D\uDD34','\uD83D\uDFE2','\uD83D\uDFE3','\uD83E\uDDE5'];
function initBgGems(){
  bgGems=[];for(var i=0;i<8;i++){
    bgGems.push({x:Math.random()*bgW,y:Math.random()*bgH,r:12+Math.random()*14,vx:(Math.random()-0.5)*0.3,vy:-0.15-Math.random()*0.3,rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.008,alpha:0.04+Math.random()*0.06,gem:BG_GEMS[Math.floor(Math.random()*BG_GEMS.length)]});
  }
  bgStars=[];for(var i=0;i<20;i++)bgStars.push({x:Math.random()*bgW,y:Math.random()*bgH,r:0.5+Math.random()*1,twinkle:Math.random()*6.28,speed:1+Math.random()*1.5});
}
initBgGems();
function drawBg(dt){
  if(!bgGrad||bgW!==bgCv.width){bgGrad=bgCtx.createLinearGradient(0,0,0,bgH);bgGrad.addColorStop(0,'#0a0118');bgGrad.addColorStop(0.4,'#150a30');bgGrad.addColorStop(1,'#0d1b3e')}
  bgCtx.fillStyle=bgGrad;bgCtx.fillRect(0,0,bgW,bgH);
  for(var i=0;i<bgStars.length;i++){var s=bgStars[i];s.twinkle+=s.speed*dt;bgCtx.globalAlpha=0.15+Math.sin(s.twinkle)*0.1;bgCtx.fillStyle='#fff';bgCtx.fillRect(s.x,s.y,s.r,s.r)}
  bgCtx.globalAlpha=1;
  for(var i=0;i<bgGems.length;i++){var g=bgGems[i];g.x+=g.vx;g.y+=g.vy;g.rot+=g.vr;if(g.y<-30){g.y=bgH+30;g.x=Math.random()*bgW}if(g.x<-30)g.x=bgW+30;if(g.x>bgW+30)g.x=-30;bgCtx.save();bgCtx.globalAlpha=g.alpha;bgCtx.translate(g.x,g.y);bgCtx.rotate(g.rot);bgCtx.font=g.r+'px system-ui';bgCtx.textAlign='center';bgCtx.textBaseline='middle';bgCtx.fillText(g.gem,0,0);bgCtx.restore()}
  bgCtx.globalAlpha=1;
}

var actx=null,audioUnlocked=false,audioEnabled=true,bgmPlaying=false,bgmOsc1=null,bgmOsc2=null,bgmGain=null;
function tn(f,d,v,tp){if(!audioUnlocked||!audioEnabled||!actx)return;try{var o=actx.createOscillator(),g=actx.createGain();o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.15,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}}
function sndMatch(c){tn(440+c*60,.1,.15);setTimeout(function(){tn((440+c*60)*1.25,.08,.12)},50);if(c>=3)setTimeout(function(){tn((440+c*60)*1.5,.12,.1)},100)}
function sndBig(){tn(523,.1,.18);setTimeout(function(){tn(659,.1,.15)},70);setTimeout(function(){tn(784,.1,.15)},140);setTimeout(function(){tn(1047,.15,.12)},210)}
function sndSpecial(){tn(880,.1,.18);setTimeout(function(){tn(1100,.1,.15)},70);setTimeout(function(){tn(1320,.15,.15)},140)}
function sndSwap(){tn(440,.06,.1);tn(550,.06,.08)}
function sndChest(){tn(440,.12,.15);setTimeout(function(){tn(660,.12,.12)},90);setTimeout(function(){tn(880,.15,.12)},180)}
function sndClick(){tn(600,.04,.1)}
function sndFail(){tn(300,.25,.18);setTimeout(function(){tn(200,.35,.15)},160)}
function sndTick(){tn(800,.04,.1)}
function sndTimeWarn(){tn(600,.1,.15,'square');setTimeout(function(){tn(800,.1,.15,'square')},110)}
function sndAchieve(){tn(523,.12,.18);setTimeout(function(){tn(659,.12,.15)},110);setTimeout(function(){tn(784,.12,.15)},220);setTimeout(function(){tn(1047,.18,.15)},330)}
function sndEvent(){tn(880,.08,.12);setTimeout(function(){tn(1100,.1,.12)},70)}
function startBGM(){if(!audioUnlocked||bgmPlaying||!actx)return;try{stopBGM();bgmGain=actx.createGain();bgmGain.gain.value=0.05;bgmGain.connect(actx.destination);bgmOsc1=actx.createOscillator();bgmOsc1.type='sine';bgmOsc1.frequency.value=110;bgmOsc2=actx.createOscillator();bgmOsc2.type='triangle';bgmOsc2.frequency.value=165;bgmOsc1.connect(bgmGain);bgmOsc2.connect(bgmGain);bgmOsc1.start();bgmOsc2.start();bgmPlaying=true;function m(){if(!bgmPlaying||!actx)return;try{var n=[110,130.81,146.83,164.81,196,174.61,146.83,130.81][Math.floor(Date.now()/4000)%8];bgmOsc1.frequency.setTargetAtTime(n,actx.currentTime,0.5);bgmOsc2.frequency.setTargetAtTime(n*1.5,actx.currentTime,0.5)}catch(e){}setTimeout(m,4000)}m()}catch(e){}}
function stopBGM(){bgmPlaying=false;try{if(bgmOsc1){bgmOsc1.stop();bgmOsc1=null}if(bgmOsc2){bgmOsc2.stop();bgmOsc2=null}}catch(e){}}
function unlockAudio(){if(audioUnlocked)return;try{actx=new(window.AudioContext||window.webkitAudioContext)}catch(e){showToast('Audio not supported');return}if(actx.state==='suspended')actx.resume();audioUnlocked=true;showToast('Sound ON!');startBGM()}
document.addEventListener('click',unlockAudio,false);
document.addEventListener('touchstart',unlockAudio,false);

var GEMS=['\uD83D\uDC8E','\uD83D\uDD37','\uD83D\uDD36','\u2B50','\uD83D\uDD34','\uD83D\uDFE2','\uD83D\uDFE3','\uD83E\uDDE5'];
var GEM_COLS=['#64b5f6','#1e88e5','#ff9800','#ffd54f','#ef5350','#66bb6a','#ab47bc','#00bcd4'];
var ROWS=8,COLS=8;
var WORLDS=[{name:'Enchanted Forest',color:'#4caf50',gems:[0,1,2,3,4,5]},{name:'Crystal Cavern',color:'#42a5f5',gems:[0,1,2,3,4,5,6]},{name:'Volcanic Peak',color:'#ff7043',gems:[0,1,2,3,4,5,6,7]},{name:'Frozen Tundra',color:'#26c6da',gems:[0,1,2,3,4,5,6,7]},{name:'Celestial Realm',color:'#ab47bc',gems:[0,1,2,3,4,5,6,7]}];
function getWorld(lvl){return WORLDS[Math.min(Math.floor(lvl/10),WORLDS.length-1)]}

var LEVELS=[];var baseTargets=[500,700,900,1100,1400,1700,2000,2400,2800,3200];var baseTimes=[45,48,50,52,48,50,48,50,45,45];
for(var w=0;w<5;w++){for(var l=0;l<10;l++){var lvl=w*10+l;var t=baseTargets[l]+w*800;var time=baseTimes[l]-w*2;if(time<25)time=25;var isBoss=(l===4||l===9);if(isBoss){t+=1000;time=Math.max(time-5,25)}var ot='score';if(l===3)ot='blue';if(l===5)ot='red';if(l===7)ot='green';if(l===8&&w>=2)ot='orange';LEVELS.push({target:t,time:time,type:ot,need:ot!=='score'?15+w*5:0,boss:isBoss})}}
var ACHIEVEMENTS=[{id:'first_match',name:'First Steps',desc:'Make first match',icon:'\uD83C\uDFAF',reward:10,check:function(s){return s.totalMatches>=1}},{id:'combo_5',name:'Combo King',desc:'Reach 5x combo',icon:'\uD83D\uDD25',reward:50,check:function(s){return s.maxCombo>=5}},{id:'speed_demon',name:'Speed Demon',desc:'Level in <15s',icon:'\u26A1',reward:75,check:function(s){return s.fastestLevel>0&&s.fastestLevel<15}},{id:'perfect_3',name:'Perfect Score',desc:'3 stars any level',icon:'\uD83D\uDC8E',reward:100,check:function(s){return s.threeStarLevels>=1}},{id:'combo_10',name:'Unstoppable',desc:'Reach 10x combo',icon:'\uD83D\uDCA5',reward:150,check:function(s){return s.maxCombo>=10}},{id:'collector',name:'Gem Collector',desc:'Earn 1000 coins',icon:'\uD83D\uDCB0',reward:200,check:function(s){return s.totalCoinsEarned>=1000}},{id:'boss_slayer',name:'Boss Slayer',desc:'Complete boss level',icon:'\uD83D\uDC79',reward:100,check:function(s){return s.bossesDefeated>=1}},{id:'daily_3',name:'Dedicated',desc:'3-day streak',icon:'\uD83D\uDCC5',reward:100,check:function(s){return s.dailyStreak>=3}},{id:'daily_7',name:'Devoted',desc:'7-day streak',icon:'\uD83C\uDF1F',reward:250,check:function(s){return s.dailyStreak>=7}},{id:'levels_10',name:'Veteran',desc:'Complete 10 levels',icon:'\uD83C\uDFC5',reward:200,check:function(s){return s.levelsCompleted>=10}},{id:'levels_25',name:'Champion',desc:'Complete 25 levels',icon:'\uD83C\uDFC6',reward:300,check:function(s){return s.levelsCompleted>=25}},{id:'levels_50',name:'Legend',desc:'Complete all 50',icon:'\uD83D\uDC51',reward:500,check:function(s){return s.levelsCompleted>=50}},{id:'mega_gem',name:'Evolution',desc:'Create Mega Gem',icon:'\uD83E\uDDEC',reward:75,check:function(s){return s.megaGemsCreated>=1}},{id:'event_5',name:'Event Hunter',desc:'Trigger 5 events',icon:'\uD83C\uDFB0',reward:100,check:function(s){return s.eventsTriggered>=5}},{id:'shield_3',name:'Shield Bearer',desc:'Shield 3 times',icon:'\uD83D\uDEE1\uFE0F',reward:80,check:function(s){return s.shieldsUsed>=3}},{id:'magnet_5',name:'Magnetic',desc:'Magnet 5 times',icon:'\uD83E\uDDF2',reward:80,check:function(s){return s.magnetsUsed>=5}},{id:'all_3star',name:'Star Master',desc:'3 stars all 50',icon:'\u2728',reward:1000,check:function(s){return s.threeStarLevels>=50}},{id:'big_combo',name:'Combo Legend',desc:'Reach 15x combo',icon:'\uD83C\uDF08',reward:300,check:function(s){return s.maxCombo>=15}},{id:'million',name:'Millionaire',desc:'Score 1M total',icon:'\uD83E\uDD11',reward:500,check:function(s){return s.totalScore>=1000000}},{id:'daily_30',name:'Loyal Player',desc:'30-day streak',icon:'\uD83D\uDC8E',reward:1000,check:function(s){return s.dailyStreak>=30}}];
var EVENTS=[{id:'double_pts',name:'\uD83D\uDD25 DOUBLE POINTS!',desc:'2x score 10s',duration:10,color:'#ff9800'},{id:'gem_rain',name:'\uD83D\uDC8E GEM RAIN!',desc:'Free gems!',duration:0,color:'#00e5ff'},{id:'time_freeze',name:'\uD83E\uDDCA TIME FREEZE!',desc:'Pause 8s',duration:8,color:'#64b5f6'},{id:'mega_match',name:'\u2728 MEGA!',desc:'Connect all!',duration:0,color:'#ffd54f'},{id:'bomb_rain',name:'\uD83D\uDCA3 BOMB!',desc:'Clear row!',duration:0,color:'#ff1744'},{id:'shield_gift',name:'\uD83D\uDEE1\uFE0F SHIELD!',desc:'Free shield!',duration:0,color:'#00e676'},{id:'score_frenzy',name:'\u26A1 FRENZY!',desc:'3x score 6s',duration:6,color:'#e91e63'}];
var SHOP_ITEMS=[{id:'hint',icon:'\uD83D\uDCA1',name:'Hint',desc:'Shows valid match',price:50},{id:'shuffle',icon:'\uD83D\uDD00',name:'Shuffle',desc:'Rearrange gems',price:80},{id:'freeze',icon:'\uD83E\uDDCA',name:'Time Freeze',desc:'Pause timer 8s',price:120},{id:'bomb',icon:'\uD83D\uDCA3',name:'Color Bomb',desc:'Clear one color',price:150},{id:'magnet',icon:'\uD83E\uDDF2',name:'Magnet',desc:'Pull same gems',price:100},{id:'shield',icon:'\uD83D\uDEE1\uFE0F',name:'Shield',desc:'Block one hit',price:90},{id:'extra_time',icon:'\u23F1\uFE0F',name:'+15 Seconds',desc:'Extra time',price:200}];

var coins=0,levelData=[],powerups={hint:2,shuffle:1,freeze:1,bomb:1,magnet:1,shield:0,extra_time:0};
var grid=[],selected=null,currentLevel=0,gameScore=0,timeLeft=0,timeTotal=0;
var isAnimating=false,gameProgress=0,shieldActive=false;
var combo=0,lastMatchTime=0,comboTime=2.0;
var shakeEl=null,particleLayer=null,timerInterval=null,lastTickSec=0;
var highScore=0;
var stats={totalMatches:0,maxCombo:0,fastestLevel:0,threeStarLevels:0,totalCoinsEarned:0,bossesDefeated:0,dailyStreak:0,levelsCompleted:0,megaGemsCreated:0,eventsTriggered:0,shieldsUsed:0,magnetsUsed:0,totalScore:0,lastPlayDate:''};
var achievements=[];
var activeEvent=null,eventTimer=null,frozen=false;
var isDaily=false;

var YT_ENV=false;try{YT_ENV=typeof ytgame!=='undefined'&&ytgame.IN_PLAYABLES_ENV}catch(e){}
function save(){var p=JSON.stringify({coins:coins,levels:levelData,powerups:powerups,highScore:highScore,stats:stats,achievements:achievements});try{if(YT_ENV&&typeof ytgame!=='undefined'&&ytgame.game&&ytgame.game.saveData)ytgame.game.saveData(p).catch(function(){try{localStorage.setItem('gv_save',p)}catch(e){}});else localStorage.setItem('gv_save',p)}catch(e){try{localStorage.setItem('gv_save',p)}catch(e2){}}}
async function load(){var raw=null;try{if(YT_ENV&&typeof ytgame!=='undefined'&&ytgame.game&&ytgame.game.loadData)raw=await ytgame.game.loadData()}catch(e){}if(!raw)try{raw=localStorage.getItem('gv_save')}catch(e){}try{var s=JSON.parse(raw);if(s){coins=s.coins||0;levelData=s.levels||[];powerups=s.powerups||{hint:2,shuffle:1,freeze:1,bomb:1,magnet:1,shield:0,extra_time:0};highScore=s.highScore||0;if(s.stats)stats=Object.assign(stats,s.stats);if(s.achievements)achievements=s.achievements}}catch(e){}checkDailyStreak()}
function checkDailyStreak(){var today=new Date().toDateString();if(stats.lastPlayDate===today)return;var yesterday=new Date(Date.now()-86400000).toDateString();if(stats.lastPlayDate===yesterday)stats.dailyStreak++;else if(stats.lastPlayDate!==today)stats.dailyStreak=1;stats.lastPlayDate=today;save()}
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2600)}
function checkAchievements(){for(var i=0;i<ACHIEVEMENTS.length;i++){var a=ACHIEVEMENTS[i];if(achievements.indexOf(a.id)===-1&&a.check(stats)){achievements.push(a.id);coins+=a.reward;save();sndAchieve();showToast('\uD83C\uDFC6 '+a.name+'! +'+a.reward+' coins')}}}

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active','fade-in')});var el=document.getElementById(id);el.classList.add('active','fade-in')}
function showMenu(){_gridEl=null;_cellCache=[];showScreen('menuScreen');document.getElementById('menuCoins').textContent=coins;checkAchievements();if(audioUnlocked)startBGM()}
function showLevelMap(){
  _gridEl=null;_cellCache=[];
  showScreen('mapScreen');document.getElementById('mapCoins').textContent=coins;
  var c=document.getElementById('levelMapContainer');c.innerHTML='';
  for(var w=0;w<WORLDS.length;w++){var wt=document.createElement('div');wt.className='world-title';wt.textContent='World '+(w+1)+': '+WORLDS[w].name;wt.style.color=WORLDS[w].color;c.appendChild(wt);
    var path=document.createElement('div');path.className='level-path';
    for(var l=0;l<10;l++){var lvl=w*10+l;if(lvl>=LEVELS.length)break;var nd=document.createElement('div');var completed=levelData[lvl]&&levelData[lvl].completed;var unlocked=lvl===0||(levelData[lvl-1]&&levelData[lvl-1].completed);nd.className='level-node '+(completed?'completed':unlocked?'unlocked':'locked');if(LEVELS[lvl].boss)nd.classList.add('boss');nd.textContent=LEVELS[lvl].boss?'\uD83D\uDC51':(l+1);nd.onclick=(function(idx){return function(){if(!isAnimating)startLevel(idx)}})(lvl);if(completed&&levelData[lvl].stars){var st=document.createElement('div');st.className='stars';st.textContent='\u2B50'.repeat(levelData[lvl].stars);nd.appendChild(st)}path.appendChild(nd)}c.appendChild(path)}
}
function showShop(){showScreen('shopScreen');document.getElementById('shopCoins').textContent=coins;var g=document.getElementById('shopGrid');g.innerHTML='';for(var i=0;i<SHOP_ITEMS.length;i++){var it=SHOP_ITEMS[i];var row=document.createElement('div');row.className='shop-item';row.innerHTML='<div class="icon">'+it.icon+'</div><div class="info"><div class="name">'+it.name+'</div><div class="desc">'+it.desc+'</div></div><div class="price'+(coins<it.price?' cant':'')+'" onclick="buyPower(\''+it.id+'\','+it.price+')">'+it.price+' \uD83D\uDCB0</div>';g.appendChild(row)}}
function buyPower(id,price){if(coins<price)return;coins-=price;powerups[id]=(powerups[id]||0)+1;sndClick();save();showShop();updatePowerUI()}
function showAchievements(){showScreen('achScreen');var g=document.getElementById('achGrid');g.innerHTML='';var u=0;for(var i=0;i<ACHIEVEMENTS.length;i++){var a=ACHIEVEMENTS[i];var done=achievements.indexOf(a.id)!==-1;if(done)u++;var row=document.createElement('div');row.className='ach-item '+(done?'unlocked':'locked');row.innerHTML='<div class="ach-icon">'+a.icon+'</div><div class="ach-info"><div class="ach-name">'+a.name+'</div><div class="ach-desc">'+a.desc+'</div></div><div class="ach-reward">'+(done?'\u2705':a.reward+'\uD83D\uDCB0')+'</div>';g.appendChild(row)}document.getElementById('achCount').textContent=u+'/'+ACHIEVEMENTS.length}
function showDaily(){showScreen('dailyScreen');document.getElementById('dailyStreak').textContent=stats.dailyStreak;var today=new Date().toDateString();var played=stats.lastPlayDate===today;document.getElementById('dailyStatus').textContent=played?'\u2705 Done today! Come back tomorrow.':'Play now for streak bonus!';document.getElementById('dailyBtn').disabled=played;document.getElementById('dailyBtn').style.opacity=played?'0.4':'1';document.getElementById('dailyTarget').textContent='\u23F1\uFE0F 40s | \uD83C\uDFAF '+(1500+stats.dailyStreak*200)+' pts | Streak: x'+Math.min(stats.dailyStreak||1,10)}
function startDaily(){var today=new Date().toDateString();if(stats.lastPlayDate===today)return;isDaily=true;currentLevel=99;gameScore=0;timeLeft=40;timeTotal=40;gameProgress=0;shieldActive=false;selected=null;isAnimating=false;combo=0;lastMatchTime=0;lastTickSec=Math.ceil(timeLeft);activeEvent=null;frozen=false;clearEvent();initGrid();showScreen('gameScreen');document.getElementById('gameLevel').textContent='\uD83D\uDCC5 DAILY';shakeEl=document.getElementById('gridWrap');particleLayer=document.getElementById('particleLayer');updateHUD();updatePowerUI();renderGrid();startTimer()}
function startLevel(idx){isDaily=false;currentLevel=idx;var lv=LEVELS[idx];gameScore=0;timeLeft=lv.time;timeTotal=lv.time;gameProgress=0;shieldActive=false;selected=null;isAnimating=false;combo=0;lastMatchTime=0;lastTickSec=Math.ceil(timeLeft);activeEvent=null;frozen=false;clearEvent();initGrid();showScreen('gameScreen');document.getElementById('gameLevel').textContent=lv.boss?'\uD83D\uDC51 BOSS '+(idx+1):'Lv '+(idx+1);shakeEl=document.getElementById('gridWrap');particleLayer=document.getElementById('particleLayer');updateHUD();updatePowerUI();renderGrid();startTimer();stopBGM()}

function startTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(function(){if(isAnimating||frozen)return;timeLeft-=0.1;if(timeLeft<0)timeLeft=0;updateTimerDisplay();var sec=Math.ceil(timeLeft);if(sec!==lastTickSec&&sec<=10&&sec>0){sndTick();if(sec<=5)sndTimeWarn();lastTickSec=sec}if(timeLeft<=0){clearInterval(timerInterval);timerInterval=null;levelFail()}},100)}

function trySwap(r1,c1,r2,c2){isAnimating=true;sndSwap();var a=getCell(r1,c1),b=getCell(r2,c2);var dx=(c2-c1)*a.offsetWidth,dy=(r2-r1)*a.offsetHeight;a.style.transition='transform .15s ease-out';b.style.transition='transform .15s ease-out';a.style.transform='translate('+dx+'px,'+dy+'px)';b.style.transform='translate('+(-dx)+'px,'+(-dy)+'px)';setTimeout(function(){a.style.transition='';b.style.transition='';a.style.transform='';b.style.transform='';var s1=grid[r1][c1]?grid[r1][c1].spec:null;var s2=grid[r2][c2]?grid[r2][c2].spec:null;var tmp=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=tmp;var matched=[];if(s1==='line')matched=matched.concat(findLineMatches(r1,c1));else if(s1==='bomb')matched=matched.concat(findBombMatches(r1,c1));else if(s1==='mega')matched=matched.concat(findMegaMatches());else if(s1==='shield')matched=matched.concat(findCrossMatches(r1,c1));else if(s1==='magnet')matched=matched.concat(findMagnetMatches(r1,c1));if(s2==='line')matched=matched.concat(findLineMatches(r2,c2));else if(s2==='bomb')matched=matched.concat(findBombMatches(r2,c2));else if(s2==='mega')matched=matched.concat(findMegaMatches());else if(s2==='shield')matched=matched.concat(findCrossMatches(r2,c2));else if(s2==='magnet')matched=matched.concat(findMagnetMatches(r2,c2));var board=findAllMatches();for(var i=0;i<board.length;i++)matched.push(board[i]);matched=dedupMatches(matched);if(matched.length>0){var now=Date.now();if(lastMatchTime>0&&(now-lastMatchTime)<comboTime*1000)combo++;else combo=1;lastMatchTime=now;processMatches(matched)}else{var tmp=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=tmp;sndSwap();renderGrid();isAnimating=false}},160)}
function findLineMatches(r,c){var gem=grid[r][c];if(!gem)return[];var m=[];for(var i=0;i<COLS;i++)if(grid[r][i]&&grid[r][i].type===gem.type)m.push({r:r,c:i});for(var i=0;i<ROWS;i++)if(grid[i][c]&&grid[i][c].type===gem.type)m.push({r:i,c:c});return m}

function findValidMove(){for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){if(c<COLS-1){var t=grid[r][c];grid[r][c]=grid[r][c+1];grid[r][c+1]=t;if(findAllMatches().length>0){grid[r][c+1]=grid[r][c];grid[r][c]=t;return{r1:r,c1:c,r2:r,c2:c+1}}grid[r][c+1]=grid[r][c];grid[r][c]=t}if(r<ROWS-1){var t=grid[r][c];grid[r][c]=grid[r+1][c];grid[r+1][c]=t;if(findAllMatches().length>0){grid[r+1][c]=grid[r][c];grid[r][c]=t;return{r1:r,c1:c,r2:r+1,c2:c}}grid[r+1][c]=grid[r][c];grid[r][c]=t}}}return null}
function shuffleGrid(){var gems=[];for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])gems.push(grid[r][c]);for(var i=gems.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=gems[i];gems[i]=gems[j];gems[j]=t}var idx=0;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])grid[r][c]=gems[idx++]}
function spawnConfetti(){var el=document.getElementById('confetti');el.innerHTML='';var cols=['#ff1744','#ffd54f','#00e676','#2979ff','#d500f9','#ff9100','#00e5ff'];for(var i=0;i<50;i++){var sp=document.createElement('span');sp.style.left=Math.random()*100+'%';sp.style.top='-10px';sp.style.background=cols[Math.floor(Math.random()*cols.length)];sp.style.animationDelay=Math.random()*.7+'s';sp.style.animationDuration=(1+Math.random())+'s';el.appendChild(sp)}setTimeout(function(){el.innerHTML=''},2200)}

var lt=performance.now();
function mainLoop(now){requestAnimationFrame(mainLoop);var dt=Math.min((now-lt)/1000,0.05);lt=now;drawBg(dt)}
requestAnimationFrame(mainLoop);

window.addEventListener('resize',function(){if(document.getElementById('gameScreen').classList.contains('active'))renderGrid()});

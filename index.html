<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Gem Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(135deg,#1a0533 0%,#2d1b69 40%,#1b3a5c 100%);font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;color:#fff}
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
.topbar{position:fixed;top:0;left:0;width:100%;height:50px;background:rgba(0,0,0,0.4);display:flex;align-items:center;padding:0 12px;z-index:100;backdrop-filter:blur(5px)}
.topbar .level-title{flex:1;text-align:center;font-size:15px;font-weight:700}
.topbar .timer{font-size:15px;font-weight:700;color:#00e5ff;min-width:50px;text-align:center;transition:color .3s}
.topbar .timer.warn{color:#ff9800;animation:timerPulse .5s infinite alternate}
.topbar .timer.danger{color:#ff1744;animation:timerPulse .3s infinite alternate}
@keyframes timerPulse{0%{transform:scale(1)}100%{transform:scale(1.15)}}
.timer-bar{position:fixed;top:50px;left:0;width:100%;height:4px;background:rgba(255,255,255,0.1);z-index:99}
.timer-fill{height:100%;transition:width .1s linear,background .3s;background:#00e5ff}
.timer-fill.warn{background:#ff9800}
.timer-fill.danger{background:#ff1744}
.menu-title{font-size:min(14vw,56px);font-weight:900;text-shadow:0 0 30px #ffd54f,0 0 60px #ff9800;margin-bottom:8px;letter-spacing:3px}
.menu-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px}
.coins-bar{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.3);padding:8px 20px;border-radius:20px;margin-bottom:20px;font-size:16px}
.level-map{width:100%;max-width:400px;overflow-y:auto;max-height:calc(100vh - 120px);padding:20px 15px 80px}
.level-path{position:relative;display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
.level-node{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;cursor:pointer;border:3px solid rgba(255,255,255,0.2);transition:all .2s;position:relative}
.level-node.unlocked{border-color:#ffd54f;background:linear-gradient(135deg,#6a1b9a,#ab47bc);box-shadow:0 0 15px rgba(171,71,188,0.5)}
.level-node.completed{border-color:#00e676;background:linear-gradient(135deg,#1b5e20,#43a047)}
.level-node.locked{opacity:0.35;pointer-events:none}
.level-node .stars{position:absolute;bottom:-14px;font-size:10px;letter-spacing:1px}
.grid-wrap{position:relative;margin-top:58px}
.grid{display:grid;gap:4px;padding:8px;background:rgba(0,0,0,0.25);border-radius:12px}
.cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,7vw,36px);border-radius:10px;cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .2s;position:relative;background:rgba(255,255,255,0.06)}
.cell:active{transform:scale(0.9)}
.cell.selected{box-shadow:0 0 0 3px #ffd54f,0 0 20px rgba(255,213,79,0.5);transform:scale(1.1);z-index:2}
.cell.special-line{box-shadow:0 0 12px rgba(0,229,255,0.7);animation:specialPulse 1s infinite alternate}
.cell.special-bomb{box-shadow:0 0 12px rgba(255,23,68,0.7);animation:specialPulse 1s infinite alternate}
@keyframes specialPulse{0%{transform:scale(1)}100%{transform:scale(1.08)}}
.cell.hint{animation:hintPulse .6s infinite alternate}
@keyframes hintPulse{0%{transform:scale(1)}100%{transform:scale(1.15);box-shadow:0 0 15px rgba(255,213,79,0.6)}}
.cell.removing{animation:gemRemove .3s forwards}
@keyframes gemRemove{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.5}100%{transform:scale(0);opacity:0}}
.cell.falling{animation:gemFall .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes gemFall{0%{transform:translateY(-50px);opacity:0}60%{opacity:1}100%{transform:translateY(0);opacity:1}}
.powerbar{position:fixed;bottom:0;left:0;width:100%;height:56px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;gap:16px;z-index:100;backdrop-filter:blur(5px)}
.pwr-btn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);position:relative;transition:all .2s}
.pwr-btn:active{transform:scale(0.9)}
.pwr-btn .cnt{position:absolute;top:-6px;right:-6px;background:#ff1744;color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:250;text-align:center}
.combo-text{font-size:clamp(28px,8vw,52px);font-weight:900;text-shadow:0 0 30px currentColor;animation:comboPop .6s forwards;white-space:nowrap}
@keyframes comboPop{0%{opacity:0;transform:scale(0.5) translateY(20px)}30%{opacity:1;transform:scale(1.2) translateY(-10px)}100%{opacity:0;transform:scale(1) translateY(-50px)}}
.combo-sub{font-size:clamp(14px,4vw,22px);opacity:0.8;animation:comboSub .8s forwards}
@keyframes comboSub{0%{opacity:0;transform:translateY(10px)}30%{opacity:0.8;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.speed-bonus{position:fixed;top:20%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:250;font-size:clamp(16px,4vw,24px);font-weight:700;color:#00e5ff;text-shadow:0 0 15px rgba(0,229,255,0.5);animation:speedPop .7s forwards}
@keyframes speedPop{0%{opacity:0;transform:translateX(-50%) scale(0.5)}30%{opacity:1;transform:translateX(-50%) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
.score-pop{position:absolute;font-weight:700;font-size:16px;pointer-events:none;z-index:200;animation:scorePop .8s forwards}
@keyframes scorePop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}
.particle-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:240}
.shake{animation:shakeAnim .3s}
@keyframes shakeAnim{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px) translateY(2px)}40%{transform:translateX(4px) translateY(-2px)}60%{transform:translateX(-3px) translateY(1px)}80%{transform:translateX(3px) translateY(-1px)}}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300}
.confetti span{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 1.5s forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.chest-wrap{display:flex;flex-direction:column;align-items:center;gap:15px}
.chest{font-size:80px;cursor:pointer;transition:transform .3s;animation:chestShake .5s infinite alternate}
@keyframes chestShake{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}
.chest.open{animation:chestOpen .5s forwards}
@keyframes chestOpen{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1) translateY(-20px)}}
.chest-hint{font-size:13px;color:rgba(255,255,255,0.5);animation:chestPulse 1s infinite alternate}
@keyframes chestPulse{0%{opacity:0.5}100%{opacity:1}}
.star-rating{display:flex;gap:8px;margin:10px 0}
.star-rating .s{font-size:36px;opacity:0.2;transform:scale(0.5);transition:all .3s}
.star-rating .s.earned{opacity:1;transform:scale(1);filter:drop-shadow(0 0 8px #ffd54f)}
.btn{padding:12px 32px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s;letter-spacing:1px}
.btn:active{transform:scale(0.95)}
.btn-play{background:linear-gradient(135deg,#00e676,#00c853);color:#0a0a1a;min-width:180px}
.btn-retry{background:linear-gradient(135deg,#ff9100,#ff6d00);color:#fff;min-width:160px}
.btn-menu{background:linear-gradient(135deg,#2979ff,#00e5ff);color:#fff;min-width:160px}
.btn-shop{background:linear-gradient(135deg,#ab47bc,#6a1b9a);color:#fff}
.btn-sm{padding:8px 20px;font-size:13px;border-radius:8px}
.shop-grid{display:flex;flex-direction:column;gap:10px;width:90%;max-width:320px;max-height:60vh;overflow-y:auto;padding:10px 0}
.shop-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.08);padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1)}
.shop-item .icon{font-size:28px;width:40px;text-align:center}
.shop-item .info{flex:1}
.shop-item .info .name{font-size:14px;font-weight:600}
.shop-item .info .desc{font-size:11px;color:rgba(255,255,255,0.4)}
.shop-item .price{font-size:13px;color:#ffd54f;font-weight:700;padding:6px 12px;border-radius:8px;background:rgba(255,213,79,0.15);cursor:pointer;white-space:nowrap}
.shop-item .price.cant{opacity:0.3;pointer-events:none}
.progress-wrap{width:80%;max-width:300px;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e676,#76ff03);border-radius:5px;transition:width .3s}
.sec-title{font-size:13px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.gap-sm{height:8px}.gap-md{height:16px}
/* Time bonus display on complete */
.time-bonus{font-size:20px;color:#00e5ff;font-weight:700;text-shadow:0 0 10px rgba(0,229,255,0.5)}
.level-info-badge{display:inline-block;background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:8px;font-size:12px;margin:4px 0}
.loading-spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,0.15);border-top-color:#ffd54f;border-radius:50%;animation:spin .8s linear infinite;margin-top:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loadingScreen" class="screen active">
  <div class="menu-title" style="font-size:min(12vw,44px)">GEM VAULT</div>
  <div class="loading-spinner"></div>
  <div class="menu-sub" style="margin-top:14px">Loading...</div>
</div>
<div id="menuScreen" class="screen">
  <div class="menu-title">GEM VAULT</div>
  <div class="menu-sub">Match-3 Puzzle</div>
  <div class="coins-bar">💰 <span id="menuCoins">0</span></div>
  <button class="btn btn-play" onclick="showLevelMap()">PLAY</button>
  <div class="gap-sm"></div>
  <button class="btn btn-shop btn-sm" onclick="showShop()">SHOP</button>
</div>
<div id="mapScreen" class="screen">
  <div style="width:100%;height:50px;display:flex;align-items:center;padding:0 12px">
    <span style="font-size:24px;cursor:pointer" onclick="showMenu()">←</span>
    <div style="flex:1;text-align:center;font-weight:700;font-size:15px">SELECT LEVEL</div>
    <div style="font-size:14px">💰<span id="mapCoins">0</span></div>
  </div>
  <div class="level-map"><div class="level-path" id="levelPath"></div></div>
</div>
<div id="gameScreen" class="screen">
  <div class="topbar">
    <div style="font-size:13px;color:#ab47bc" id="gameLevel">Level 1</div>
    <div class="level-title" id="gameTarget">Score: 0/500</div>
    <div class="timer" id="gameTimer">60s</div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="grid-wrap" id="gridWrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="powerbar">
    <div class="pwr-btn" onclick="usePower('hint')" title="Hint">💡<span class="cnt" id="hintCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('shuffle')" title="Shuffle">🔀<span class="cnt" id="shuffleCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('moves')" title="+10 Seconds">⏱️<span class="cnt" id="movesCnt">0</span></div>
    <div class="pwr-btn" onclick="usePower('bomb')" title="Color Bomb">💣<span class="cnt" id="bombCnt">0</span></div>
  </div>
</div>
<div id="completeScreen" class="screen">
  <div style="font-size:min(10vw,40px);font-weight:900;color:#00e676;text-shadow:0 0 20px rgba(0,230,118,0.5)">LEVEL COMPLETE!</div>
  <div class="star-rating"><span class="s" id="s1">⭐</span><span class="s" id="s2">⭐</span><span class="s" id="s3">⭐</span></div>
  <div class="gap-sm"></div>
  <div id="completeStats" style="text-align:center"></div>
  <div class="gap-sm"></div>
  <div class="sec-title">YOUR REWARD</div>
  <div class="chest-wrap">
    <div class="chest" id="chest" onclick="openChest()">📦</div>
    <div class="chest-hint" id="chestHint">Tap the chest!</div>
  </div>
  <div class="gap-md"></div>
  <div id="rewardText" style="font-size:18px;color:#ffd54f;font-weight:700;min-height:24px"></div>
  <div class="gap-md"></div>
  <button class="btn btn-play" onclick="nextLevel()">NEXT LEVEL</button>
  <div class="gap-sm"></div>
  <button class="btn btn-menu btn-sm" onclick="showLevelMap()">LEVEL MAP</button>
</div>
<div id="failScreen" class="screen">
  <div style="font-size:min(10vw,40px);font-weight:900;color:#ff1744;text-shadow:0 0 20px rgba(255,23,68,0.5)">TIME'S UP!</div>
  <div class="gap-md"></div>
  <div class="sec-title">PROGRESS</div>
  <div class="progress-wrap"><div class="progress-fill" id="failProgress" style="width:0%"></div></div>
  <div id="failScore" style="font-size:14px;color:rgba(255,255,255,0.5)"></div>
  <div class="gap-md"></div>
  <button class="btn btn-retry" onclick="retryLevel()">RETRY</button>
  <div class="gap-sm"></div>
  <button class="btn btn-menu btn-sm" onclick="showLevelMap()">LEVEL MAP</button>
</div>
<div id="shopScreen" class="screen">
  <div style="width:100%;max-width:400px;padding:0 15px">
    <div style="display:flex;align-items:center;margin-bottom:15px">
      <span style="font-size:24px;cursor:pointer" onclick="showMenu()">←</span>
      <div style="flex:1;text-align:center;font-weight:700;font-size:18px">SHOP</div>
      <div style="font-size:14px">💰<span id="shopCoins">0</span></div>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>
</div>
<div id="rewardOverlay" class="screen" style="background:rgba(0,0,0,0.8)">
  <div style="font-size:36px;margin-bottom:10px" id="rewardIcon"></div>
  <div style="font-size:20px;font-weight:700;color:#ffd54f" id="rewardLabel"></div>
  <div class="gap-md"></div>
  <button class="btn btn-play btn-sm" onclick="closeReward()">OK</button>
</div>
<div class="confetti" id="confetti"></div>
<div class="particle-layer" id="particleLayer"></div>

<script src="https://www.youtube.com/game_api/v1"></script>
<script>
try{(async function(){
try{if(typeof ytgame!=='undefined'&&ytgame.game)ytgame.game.firstFrameReady()}catch(e){}

var actx=null,audioOn=true;
function ia(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function tn(f,d,v,tp){if(!actx||!audioOn)return;try{var o=actx.createOscillator(),g=actx.createGain();o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.05,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}}
function sndMatch(combo){ia();var base=440+combo*60;tn(base,0.08,0.05);setTimeout(function(){tn(base*1.25,0.06,0.04)},40);if(combo>=3)setTimeout(function(){tn(base*1.5,0.1,0.04)},80)}
function sndBig(){ia();tn(523,0.06,0.06);setTimeout(function(){tn(659,0.06,0.05)},50);setTimeout(function(){tn(784,0.06,0.05)},100);setTimeout(function(){tn(1047,0.12,0.05)},150)}
function sndSpecial(){ia();tn(880,0.06,0.06);setTimeout(function(){tn(1100,0.06,0.05)},60);setTimeout(function(){tn(1320,0.12,0.06)},120)}
function sndSwap(){ia();tn(400,0.04,0.03)}
function sndChest(){ia();tn(440,0.1,0.05);setTimeout(function(){tn(660,0.1,0.05)},80);setTimeout(function(){tn(880,0.15,0.05)},160)}
function sndClick(){ia();tn(500,0.03,0.03)}
function sndFail(){ia();tn(300,0.2,0.06);setTimeout(function(){tn(200,0.3,0.05)},150)}
function sndTick(){ia();tn(800,0.03,0.02)}
function sndTimeWarn(){ia();tn(600,0.08,0.06,'square');setTimeout(function(){tn(800,0.08,0.06,'square')},100)}

var GEMS=['💎','🔷','🔶','⭐','🔴','🟢'];
var GEM_COLS=['#64b5f6','#1e88e5','#ff9800','#ffd54f','#ef5350','#66bb6a'];
var ROWS=8,COLS=8;

var LEVELS=[
  {target:500,time:45,type:'score'},
  {target:800,time:50,type:'score'},
  {target:1200,time:55,type:'score'},
  {target:1500,time:50,type:'blue',need:15},
  {target:1800,time:50,type:'score'},
  {target:2000,time:55,type:'red',need:20},
  {target:2500,time:50,type:'score'},
  {target:3000,time:55,type:'green',need:25},
  {target:3500,time:50,type:'score'},
  {target:4000,time:50,type:'orange',need:30}
];

var coins=0,levelData=[],powerups={hint:2,shuffle:1,moves:1,bomb:1};
var grid=[],selected=null,currentLevel=0,gameScore=0,timeLeft=0,timeTotal=0;
var isAnimating=false,gameProgress=0;
var combo=0,lastMatchTime=0,comboTime=2.0;
var shakeEl=null,particleLayer=null,timerInterval=null,lastTickSec=0;

var YT_ENV=false;try{YT_ENV=typeof ytgame!=='undefined'&&ytgame.IN_PLAYABLES_ENV}catch(e){}
var highScore=0;
function save(){
  var payload=JSON.stringify({coins:coins,levels:levelData,powerups:powerups,highScore:highScore});
  try{
    if(YT_ENV&&typeof ytgame!=='undefined'&&ytgame.game&&ytgame.game.saveData){
      ytgame.game.saveData(payload).catch(function(){try{localStorage.setItem('gv_save',payload)}catch(e){}});
    }else{
      localStorage.setItem('gv_save',payload);
    }
  }catch(e){try{localStorage.setItem('gv_save',payload)}catch(e2){}}
}
async function load(){
  var raw=null;
  try{
    if(YT_ENV&&typeof ytgame!=='undefined'&&ytgame.game&&ytgame.game.loadData){
      raw=await ytgame.game.loadData();
    }
  }catch(e){}
  if(!raw){try{raw=localStorage.getItem('gv_save')}catch(e){}}
  try{
    var s=JSON.parse(raw);
    if(s){coins=s.coins||0;levelData=s.levels||[];powerups=s.powerups||{hint:2,shuffle:1,moves:1,bomb:1};highScore=s.highScore||0}
  }catch(e){}
}

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}
function showMenu(){showScreen('menuScreen');document.getElementById('menuCoins').textContent=coins}
function showLevelMap(){
  showScreen('mapScreen');document.getElementById('mapCoins').textContent=coins;
  var path=document.getElementById('levelPath');path.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var nd=document.createElement('div');
    var completed=levelData[i]&&levelData[i].completed;
    var unlocked=i===0||(levelData[i-1]&&levelData[i-1].completed);
    nd.className='level-node '+(completed?'completed':unlocked?'unlocked':'locked');
    nd.textContent=i+1;
    nd.onclick=(function(idx){return function(){if(!isAnimating)startLevel(idx)}})(i);
    if(completed&&levelData[i].stars){var st=document.createElement('div');st.className='stars';st.textContent='⭐'.repeat(levelData[i].stars);nd.appendChild(st)}
    path.appendChild(nd);
  }
}
function showShop(){
  showScreen('shopScreen');document.getElementById('shopCoins').textContent=coins;
  var items=[{id:'hint',icon:'💡',name:'Hint',desc:'Shows a valid match',price:50},{id:'shuffle',icon:'🔀',name:'Shuffle',desc:'Rearranges all gems',price:80},{id:'moves',icon:'⏱️',name:'+10 Seconds',desc:'Extra 10 seconds',price:100},{id:'bomb',icon:'💣',name:'Color Bomb',desc:'Clears one gem color',price:150}];
  var g=document.getElementById('shopGrid');g.innerHTML='';
  for(var i=0;i<items.length;i++){var it=items[i];var row=document.createElement('div');row.className='shop-item';row.innerHTML='<div class="icon">'+it.icon+'</div><div class="info"><div class="name">'+it.name+'</div><div class="desc">'+it.desc+'</div></div><div class="price'+(coins<it.price?' cant':'')+'" onclick="buyPower(\''+it.id+'\','+it.price+')">'+it.price+' 💰</div>';g.appendChild(row)}
}
function buyPower(id,price){if(coins<price)return;coins-=price;powerups[id]=(powerups[id]||0)+1;sndClick();save();showShop();updatePowerUI()}

function startLevel(idx){
  currentLevel=idx;var lv=LEVELS[idx];
  gameScore=0;timeLeft=lv.time;timeTotal=lv.time;gameProgress=0;
  selected=null;isAnimating=false;combo=0;lastMatchTime=0;lastTickSec=Math.ceil(timeLeft);
  initGrid();showScreen('gameScreen');
  document.getElementById('gameLevel').textContent='Level '+(idx+1);
  shakeEl=document.getElementById('gridWrap');
  particleLayer=document.getElementById('particleLayer');
  updateHUD();updatePowerUI();renderGrid();startTimer();
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(isAnimating||!timeLeft)return;
    timeLeft-=0.1;
    if(timeLeft<0)timeLeft=0;
    updateTimerDisplay();
    var sec=Math.ceil(timeLeft);
    if(sec!==lastTickSec&&sec<=10&&sec>0){sndTick();lastTickSec=sec}
    if(sec<=5&&sec>0&&sec!==lastTickSec)sndTimeWarn();
    if(timeLeft<=0){clearInterval(timerInterval);timerInterval=null;levelFail()}
  },100);
}

function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}

function updateTimerDisplay(){
  var el=document.getElementById('gameTimer');
  var fill=document.getElementById('timerFill');
  var sec=Math.ceil(timeLeft);
  el.textContent=sec+'s';
  var pct=timeLeft/timeTotal*100;
  fill.style.width=pct+'%';
  el.className='timer';
  fill.className='timer-fill';
  if(pct<=20){el.classList.add('danger');fill.classList.add('danger')}
  else if(pct<=40){el.classList.add('warn');fill.classList.add('warn')}
}

function updateHUD(){
  var lv=LEVELS[currentLevel];
  var t='';
  if(lv.type==='score')t='Score: '+gameScore+'/'+lv.target;
  else{var gn=GEMS[{blue:1,red:4,green:5,orange:2}[lv.type]];t=gn+' '+gameProgress+'/'+lv.need}
  document.getElementById('gameTarget').textContent=t;
  updateTimerDisplay();
}
function updatePowerUI(){
  document.getElementById('hintCnt').textContent=powerups.hint||0;
  document.getElementById('shuffleCnt').textContent=powerups.shuffle||0;
  document.getElementById('movesCnt').textContent=powerups.moves||0;
  document.getElementById('bombCnt').textContent=powerups.bomb||0;
}

function initGrid(){
  grid=[];
  for(var r=0;r<ROWS;r++){grid[r]=[];for(var c=0;c<COLS;c++){var g;do{g=Math.floor(Math.random()*GEMS.length)}while((c>=2&&grid[r][c-1].type===g&&grid[r][c-2].type===g)||(r>=2&&grid[r-1][c].type===g&&grid[r-2][c].type===g));grid[r][c]={type:g,spec:null}}}
  var guard=0;while(!findValidMove()&&guard<30){shuffleGrid();guard++}
}

function renderGrid(){
  var el=document.getElementById('grid');
  el.style.gridTemplateColumns='repeat('+COLS+',1fr)';
  var availH=window.innerHeight-58-56-24;
  var size=Math.max(160,Math.min(window.innerWidth-24,availH,COLS*48));
  el.style.width=size+'px';
  el.style.height=size+'px';
  el.innerHTML='';
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var cell=document.createElement('div');cell.className='cell';
    var gem=grid[r][c];
    if(!gem){cell.style.opacity='0'}
    else{
      cell.textContent=GEMS[gem.type];
      if(gem.spec==='line')cell.classList.add('special-line');
      if(gem.spec==='bomb')cell.classList.add('special-bomb');
    }
    cell.dataset.r=r;cell.dataset.c=c;
    cell.onclick=(function(rr,cc){return function(){onCellClick(rr,cc)}})(r,c);
    el.appendChild(cell);
  }}
}

function getCell(r,c){return document.getElementById('grid').children[r*COLS+c]}

function onCellClick(r,c){
  if(isAnimating||!grid[r][c]||timeLeft<=0)return;
  if(!selected){selected={r:r,c:c};getCell(r,c).classList.add('selected');sndClick()}
  else{
    getCell(selected.r,selected.c).classList.remove('selected');
    var dr=Math.abs(selected.r-r),dc=Math.abs(selected.c-c);
    if((dr===1&&dc===0)||(dr===0&&dc===1)){trySwap(selected.r,selected.c,r,c)}
    else{selected={r:r,c:c};getCell(r,c).classList.add('selected');sndClick();return}
    selected=null;
  }
}

function trySwap(r1,c1,r2,c2){
  isAnimating=true;sndSwap();
  var a=getCell(r1,c1),b=getCell(r2,c2);
  a.style.transition='transform .2s';b.style.transition='transform .2s';
  var dx=(c2-c1)*a.offsetWidth,dy=(r2-r1)*a.offsetHeight;
  a.style.transform='translate('+dx+'px,'+dy+'px)';
  b.style.transform='translate('+(-dx)+'px,'+(-dy)+'px)';
  setTimeout(function(){
    a.style.transition='';b.style.transition='';a.style.transform='';b.style.transform='';
    var spec1=grid[r1][c1]?grid[r1][c1].spec:null;
    var spec2=grid[r2][c2]?grid[r2][c2].spec:null;
    var tmp=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=tmp;
    var matched=[];
    if(spec1==='line')matched=matched.concat(findLineMatches(r1,c1));
    else if(spec1==='bomb')matched=matched.concat(findBombMatches(r1,c1));
    if(spec2==='line')matched=matched.concat(findLineMatches(r2,c2));
    else if(spec2==='bomb')matched=matched.concat(findBombMatches(r2,c2));
    var boardMatches=findAllMatches();
    for(var i=0;i<boardMatches.length;i++)matched.push(boardMatches[i]);
    matched=dedupMatches(matched);
    if(matched.length>0){
      var now=Date.now();
      if(lastMatchTime>0&&(now-lastMatchTime)<comboTime*1000)combo++;
      else combo=1;
      lastMatchTime=now;
      processMatches(matched);
    }else{
      var tmp=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=tmp;
      sndSwap();renderGrid();isAnimating=false;
    }
  },220);
}

function findLineMatches(r,c){
  var gem=grid[r][c];if(!gem)return[];
  var matches=[];
  for(var i=0;i<COLS;i++)if(grid[r][i]&&grid[r][i].type===gem.type)matches.push({r:r,c:i});
  for(var i=0;i<ROWS;i++)if(grid[i][c]&&grid[i][c].type===gem.type)matches.push({r:i,c:c});
  return matches;
}
function findBombMatches(r,c){
  var gem=grid[r][c];if(!gem)return[];
  var matches=[];
  for(var rr=0;rr<ROWS;rr++)for(var cc=0;cc<COLS;cc++)if(grid[rr][cc]&&grid[rr][cc].type===gem.type)matches.push({r:rr,c:cc});
  return matches;
}
function dedupMatches(arr){
  var seen={};var out=[];
  for(var i=0;i<arr.length;i++){var k=arr[i].r+','+arr[i].c;if(!seen[k]){seen[k]=1;out.push(arr[i])}}
  return out;
}

function findAllMatches(){
  var matched={};
  for(var r=0;r<ROWS;r++){var c=0;while(c<COLS){var v=grid[r][c];if(!v){c++;continue}var end=c+1;while(end<COLS&&grid[r][end]&&grid[r][end].type===v.type)end++;if(end-c>=3){for(var i=c;i<end;i++)matched[r+','+i]=true}c=end}}
  for(var c=0;c<COLS;c++){var r=0;while(r<ROWS){var v=grid[r][c];if(!v){r++;continue}var end=r+1;while(end<ROWS&&grid[end][c]&&grid[end][c].type===v.type)end++;if(end-r>=3){for(var i=r;i<end;i++)matched[i+','+c]=true}r=end}}
  var list=[];for(var k in matched){var p=k.split(',');list.push({r:parseInt(p[0]),c:parseInt(p[1])})}
  return list;
}

function processMatches(matches){
  var count=matches.length;
  var basePts=count*10;
  if(count>=5)basePts+=100;
  else if(count>=4)basePts+=50;
  else if(count>=3)basePts+=10;
  var multiplier=Math.min(combo,10);
  var pts=basePts*multiplier;
  var now=Date.now();
  var speedBonus=0;
  if(lastMatchTime>0){
    var elapsed=(now-lastMatchTime)/1000;
    if(elapsed<0.5)speedBonus=50*multiplier;
    else if(elapsed<1.0)speedBonus=30*multiplier;
    else if(elapsed<1.5)speedBonus=15*multiplier;
  }
  pts+=speedBonus;
  gameScore+=pts;

  var lv=LEVELS[currentLevel];
  if(lv.type!=='score'){
    var gemIdx={blue:1,red:4,green:5,orange:2}[lv.type];
    for(var i=0;i<matches.length;i++)if(grid[matches[i].r][matches[i].c]&&grid[matches[i].r][matches[i].c].type===gemIdx)gameProgress++;
  }

  var specialCreate=null;
  if(count>=5)specialCreate={type:'bomb',at:matches[Math.floor(matches.length/2)]};
  else if(count>=4)specialCreate={type:'line',at:matches[Math.floor(matches.length/2)]};

  if(multiplier>=5)sndBig();
  else if(count>=4)sndSpecial();
  else sndMatch(combo);

  showComboDisplay(multiplier,pts,speedBonus);
  spawnMatchParticles(matches);
  if(multiplier>=3||count>=4)doShake();

  for(var i=0;i<matches.length;i++){var cell=getCell(matches[i].r,matches[i].c);if(cell)cell.classList.add('removing')}

  setTimeout(function(){
    for(var i=0;i<matches.length;i++)grid[matches[i].r][matches[i].c]=null;
    if(specialCreate){
      var sa=specialCreate.at;
      grid[sa.r][sa.c]={type:grid[sa.r][sa.c]?grid[sa.r][sa.c].type:Math.floor(Math.random()*GEMS.length),spec:specialCreate.type};
    }
    renderGrid();dropGems();
  },300);
}

function dropGems(){
  for(var c=0;c<COLS;c++){
    var empty=0;
    for(var r=ROWS-1;r>=0;r--){
      if(!grid[r][c])empty++;
      else if(empty>0){grid[r+empty][c]=grid[r][c];grid[r][c]=null}
    }
    for(var r=0;r<empty;r++)grid[r][c]={type:Math.floor(Math.random()*GEMS.length),spec:null};
  }
  renderGrid();
  for(var c=0;c<COLS;c++)for(var r=0;r<ROWS;r++)if(grid[r][c]){var cl=getCell(r,c);if(cl)cl.classList.add('falling')}
  setTimeout(function(){
    var matches=findAllMatches();
    if(matches.length>0){
      combo++;
      lastMatchTime=Date.now();
      processMatches(matches);
    }else if(!findValidMove()){
      shuffleGrid();renderGrid();
      setTimeout(function(){
        var m2=findAllMatches();
        if(m2.length>0){combo++;lastMatchTime=Date.now();processMatches(m2)}
        else{isAnimating=false;combo=0;updateHUD();checkLevelEnd()}
      },350);
    }else{
      isAnimating=false;combo=0;
      updateHUD();checkLevelEnd();
    }
  },380);
}

function checkLevelEnd(){
  var lv=LEVELS[currentLevel];
  var complete=(lv.type==='score'&&gameScore>=lv.target)||(lv.type!=='score'&&gameProgress>=lv.need);
  if(complete){stopTimer();levelComplete()}
}

function showComboDisplay(mult,pts,speedBonus){
  var el=document.getElementById('particleLayer');
  if(mult>=2){
    var colors=['#fff','#ffd54f','#ff9800','#ff5722','#e91e63','#d500f9','#00e5ff'];
    var col=colors[Math.min(mult,colors.length)-1];
    var label=mult>=10?'INSANE!':mult>=7?'GODLIKE!':mult>=5?'AMAZING!':mult>=3?'GREAT!':'x'+mult+' COMBO!';
    var d=document.createElement('div');d.className='combo-display';
    d.innerHTML='<div class="combo-text" style="color:'+col+'">'+label+'</div><div class="combo-sub">+'+pts+' pts</div>';
    el.appendChild(d);setTimeout(function(){d.remove()},900);
  }
  if(speedBonus>0){
    var d2=document.createElement('div');d2.className='speed-bonus';
    d2.textContent='⚡ SPEED +'+speedBonus;
    el.appendChild(d2);setTimeout(function(){d2.remove()},700);
  }
}

function spawnMatchParticles(matches){
  if(!particleLayer)return;
  var gridEl=document.getElementById('grid');if(!gridEl)return;
  var rect=gridEl.getBoundingClientRect();var cellW=rect.width/COLS;
  for(var i=0;i<matches.length;i++){
    var m=matches[i];var gem=grid[m.r][m.c];if(!gem)continue;
    var cx=rect.left+m.c*cellW+cellW/2,cy=rect.top+m.r*cellW+cellW/2;
    var col=GEM_COLS[gem.type]||'#fff';
    for(var j=0;j<8;j++){
      var p=document.createElement('div');
      p.style.cssText='position:absolute;width:6px;height:6px;border-radius:50%;background:'+col+';left:'+cx+'px;top:'+cy+'px;pointer-events:none;transition:all .5s ease-out;opacity:1';
      particleLayer.appendChild(p);
      var angle=Math.random()*Math.PI*2;var dist=30+Math.random()*50;
      (function(el,ax,ay){setTimeout(function(){
        el.style.left=(ax+Math.cos(angle)*dist)+'px';
        el.style.top=(ay+Math.sin(angle)*dist)+'px';
        el.style.opacity='0';el.style.transform='scale(0)';
      },10)})(p,cx,cy);
    }
  }
  setTimeout(function(){particleLayer.innerHTML=''},600);
}

function doShake(){if(shakeEl){shakeEl.classList.remove('shake');void shakeEl.offsetWidth;shakeEl.classList.add('shake')}}

function levelComplete(){
  stopTimer();
  var lv=LEVELS[currentLevel];
  var timeUsed=lv.time-timeLeft;
  var pctRemaining=timeLeft/timeTotal;
  var stars=pctRemaining>=0.5?3:pctRemaining>=0.25?2:1;
  var timeBonus=Math.round(timeLeft*5);
  var earnedCoins=stars*30+10+Math.floor(timeBonus/10);

  if(!levelData[currentLevel])levelData[currentLevel]={};
  levelData[currentLevel].completed=true;
  if(!levelData[currentLevel].stars||stars>levelData[currentLevel].stars)levelData[currentLevel].stars=stars;
  coins+=earnedCoins;
  if(gameScore>highScore){
    highScore=gameScore;
    try{if(typeof ytgame!=='undefined'&&ytgame.engagement)ytgame.engagement.sendScore({value:Math.floor(highScore)})}catch(e){}
  }
  save();

  showScreen('completeScreen');
  for(var i=1;i<=3;i++)document.getElementById('s'+i).className='s';

  var stats=document.getElementById('completeStats');
  stats.innerHTML='<div style="font-size:14px;color:rgba(255,255,255,0.5)">⏱️ Time: '+timeUsed.toFixed(1)+'s</div>'+
    '<div class="time-bonus" style="margin-top:6px">⚡ Time Bonus: +'+timeBonus+'</div>'+
    '<div style="font-size:13px;color:rgba(255,255,255,0.4);margin-top:4px">'+stars+'⭐ = '+stars*30+' + 10 + '+Math.floor(timeBonus/10)+' coins</div>';

  setTimeout(function(){for(var i=1;i<=stars;i++){(function(idx){setTimeout(function(){document.getElementById('s'+idx).classList.add('earned');tn(440+idx*100,0.08,0.04)},idx*400)})(i)}},300);
  document.getElementById('chest').className='chest';
  document.getElementById('chestHint').textContent='Tap the chest!';document.getElementById('chestHint').style.display='';
  document.getElementById('rewardText').textContent=earnedCoins+' coins earned!';
  spawnConfetti();
}

function openChest(){
  var chest=document.getElementById('chest');if(chest.classList.contains('open'))return;
  chest.classList.add('open');document.getElementById('chestHint').style.display='none';sndChest();
  var rw=[{id:'hint',icon:'💡',name:'Hint'},{id:'shuffle',icon:'🔀',name:'Shuffle'},{id:'moves',icon:'⏱️',name:'+10 Seconds'},{id:'bomb',icon:'💣',name:'Color Bomb'}];
  var ri=Math.floor(Math.random()*rw.length);powerups[rw[ri].id]=(powerups[rw[ri].id]||0)+1;save();
  setTimeout(function(){document.getElementById('rewardIcon').textContent=rw[ri].icon;document.getElementById('rewardLabel').textContent='+1 '+rw[ri].name+'!';document.getElementById('rewardOverlay').classList.add('active')},600);
}
function closeReward(){document.getElementById('rewardOverlay').classList.remove('active')}
function nextLevel(){if(currentLevel+1<LEVELS.length)startLevel(currentLevel+1);else showLevelMap()}

function levelFail(){
  stopTimer();sndFail();showScreen('failScreen');
  var lv=LEVELS[currentLevel];var pct=0;
  if(lv.type==='score')pct=Math.min(100,Math.round(gameScore/lv.target*100));
  else pct=Math.min(100,Math.round(gameProgress/lv.need*100));
  document.getElementById('failProgress').style.width=pct+'%';
  document.getElementById('failScore').textContent=gameScore+' points scored';
}
function retryLevel(){startLevel(currentLevel)}

function usePower(type){
  if(isAnimating||timeLeft<=0)return;
  if(type==='hint'){
    if((powerups.hint||0)<=0)return;
    var move=findValidMove();if(!move)return;
    powerups.hint--;save();updatePowerUI();sndClick();
    var c1=getCell(move.r1,move.c1),c2=getCell(move.r2,move.c2);
    if(c1)c1.classList.add('hint');if(c2)c2.classList.add('hint');
    setTimeout(function(){if(c1)c1.classList.remove('hint');if(c2)c2.classList.remove('hint')},2000);
  }else if(type==='shuffle'){
    if((powerups.shuffle||0)<=0)return;
    powerups.shuffle--;save();updatePowerUI();sndClick();
    isAnimating=true;
    shuffleGrid();renderGrid();
    setTimeout(function(){var m=findAllMatches();if(m.length>0){combo=1;lastMatchTime=Date.now();processMatches(m)}else isAnimating=false},100);
  }else if(type==='moves'){
    if((powerups.moves||0)<=0)return;
    powerups.moves--;timeLeft=Math.min(timeLeft+10,timeTotal+10);save();updatePowerUI();updateHUD();sndClick();
  }else if(type==='bomb'){
    if((powerups.bomb||0)<=0)return;
    powerups.bomb--;save();updatePowerUI();sndClick();
    isAnimating=true;
    var counts=[0,0,0,0,0,0];
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])counts[grid[r][c].type]++;
    var maxG=0;for(var i=1;i<6;i++)if(counts[i]>counts[maxG])maxG=i;
    var matches=[];for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]&&grid[r][c].type===maxG)matches.push({r:r,c:c});
    combo=1;lastMatchTime=Date.now();processMatches(matches);
  }
}

function findValidMove(){
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    if(c<COLS-1){var t=grid[r][c];grid[r][c]=grid[r][c+1];grid[r][c+1]=t;if(findAllMatches().length>0){grid[r][c+1]=grid[r][c];grid[r][c]=t;return{r1:r,c1:c,r2:r,c2:c+1}}grid[r][c+1]=grid[r][c];grid[r][c]=t}
    if(r<ROWS-1){var t=grid[r][c];grid[r][c]=grid[r+1][c];grid[r+1][c]=t;if(findAllMatches().length>0){grid[r+1][c]=grid[r][c];grid[r][c]=t;return{r1:r,c1:c,r2:r+1,c2:c}}grid[r+1][c]=grid[r][c];grid[r][c]=t}
  }}return null;
}

function shuffleGrid(){
  var gems=[];for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])gems.push(grid[r][c]);
  for(var i=gems.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=gems[i];gems[i]=gems[j];gems[j]=t}
  var idx=0;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c])grid[r][c]=gems[idx++];
}

function spawnConfetti(){
  var el=document.getElementById('confetti');el.innerHTML='';
  var cols=['#ff1744','#ffd54f','#00e676','#2979ff','#d500f9','#ff9100'];
  for(var i=0;i<60;i++){var sp=document.createElement('span');sp.style.left=Math.random()*100+'%';sp.style.top='-10px';sp.style.background=cols[Math.floor(Math.random()*cols.length)];sp.style.animationDelay=Math.random()*0.8+'s';sp.style.animationDuration=(1+Math.random())+'s';el.appendChild(sp)}
  setTimeout(function(){el.innerHTML=''},2500);
}

try{
  if(typeof ytgame!=='undefined'&&ytgame.system){
    try{audioOn=ytgame.system.isAudioEnabled?ytgame.system.isAudioEnabled():true}catch(e){}
    ytgame.system.onPause(function(){stopTimer();save()});
    ytgame.system.onResume(function(){if(timeLeft>0&&!isAnimating)startTimer()});
    ytgame.system.onAudioEnabledChange(function(en){audioOn=en});
  }
}catch(e){}

window.addEventListener('resize',function(){if(document.getElementById('gameScreen').classList.contains('active'))renderGrid()});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&document.getElementById('rewardOverlay').classList.contains('active'))closeReward()});

window.showMenu=showMenu;window.showLevelMap=showLevelMap;window.showShop=showShop;window.startLevel=startLevel;window.usePower=usePower;window.openChest=openChest;window.nextLevel=nextLevel;window.retryLevel=retryLevel;window.buyPower=buyPower;window.closeReward=closeReward;

await load();
showMenu();
try{if(typeof ytgame!=='undefined'&&ytgame.game)ytgame.game.gameReady()}catch(e){}
})()}catch(e){document.body.innerHTML='<pre style="color:#ff5555;padding:20px">'+e+'</pre>'}
</script>
